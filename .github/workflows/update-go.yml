name: Update Go

on:
  schedule:
    - cron: "0 2 1 * *"
  workflow_dispatch:

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd #v6.0.2
        with:
          token: ${{ secrets.MAINTENANCE_TOKEN }}
          fetch-depth: 0
          persists-credentials: false
      - name: Run Common Setup
        uses: ./.github/actions/setup
        with:
          go-version: stable
      - name: Install golangci-lint
        run: go install github.com/golangci/golangci-lint/v2/cmd/golangci-lint@latest
      - name: Install Qemu
        run: sudo apt-get update && sudo apt-get install -y qemu-user
      - name: Update Go dependencies
        run: just update
      - name: Format code
        run: just fmt
      - name: Run all tests
        run: just test-all
      - name: Commit updates
        uses: stefanzweifel/git-auto-commit-action@04702edda442b2e678b25b537cec683a1493fcb9 #v7.1.0
        env:
          GITHUB_TOKEN: ${{ secrets.MAINTENANCE_TOKEN }}
        with:
          commit_message: Update Go dependencies
          commit_user_name: Maintenance Bob
          commit_user_email: bob@archlinux.de
          commit_author: Maintenance Bob <bob@archlinux.de>
